<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mazar Martin — Property Intelligence</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green: #1C3A2A;
  --green-light: #2D5A40;
  --gold: #C9A84C;
  --gold-pale: #FBF7EE;
  --bg: #F5F0E8;
  --white: #FFFFFF;
  --border: #E0D5C0;
  --border-light: #F0EBE0;
  --text: #2C2C2C;
  --text-mid: #6B6258;
  --text-light: #8A8070;
  --red: #C62828;
  --red-bg: #FFEBEE;
  --green-bg: #E8F5E9;
  --blue-bg: #E3F2FD;
  --amber-bg: #FFF8E1;
  --purple-bg: #F3E5F5;
  --ff-serif: 'Cormorant Garamond', Georgia, serif;
  --ff-ui: 'Montserrat', -apple-system, sans-serif;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --radius: 8px;
}

body { font-family: var(--ff-ui); background: var(--bg); color: var(--text); line-height: 1.5; }

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  background: var(--green); color: var(--white);
  padding: 14px 24px; display: flex; align-items: center; gap: 20px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1 { font-family: var(--ff-serif); font-size: 26px; font-weight: 600; white-space: nowrap; }
.header-search { flex:1; max-width: 500px; position: relative; }
.header-search input {
  width:100%; padding: 8px 14px 8px 36px; border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px; background: rgba(255,255,255,.12); color: var(--white);
  font-size: 13px; transition: all .2s;
}
.header-search input::placeholder { color: rgba(255,255,255,.5); }
.header-search input:focus { background: rgba(255,255,255,.2); border-color: var(--gold); outline: none; }
.header-search::before {
  content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none;
}
.search-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  max-height: 420px; overflow-y: auto; z-index: 1000; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
}
.search-dropdown.active { display: block; }
.search-group { padding: 6px 0; border-bottom: 1px solid var(--border-light); }
.search-group:last-child { border-bottom: none; }
.search-group-title {
  padding: 4px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text-light); background: var(--gold-pale);
}
.search-item {
  padding: 8px 14px; cursor: pointer; font-size: 13px;
  border-left: 3px solid transparent; transition: all .15s;
}
.search-item:hover { background: var(--gold-pale); border-left-color: var(--gold); }
.g-hl { background: #FFEB3B; font-weight: 600; border-radius: 2px; padding: 0 1px; }
.search-price { color: var(--gold); font-weight: 600; font-size: 12px; }
.search-suburb { color: var(--text-light); font-size: 12px; }
.header-date { font-size: 11px; color: rgba(255,255,255,.6); white-space: nowrap; }

/* ── Tab Bar ─────────────────────────────────────────────────────────────── */
.tab-bar {
  background: var(--white); border-bottom: 2px solid var(--border);
  display: flex; overflow-x: auto; gap: 0;
  position: sticky; top: 56px; z-index: 90;
  scrollbar-width: thin;
}
.tab-btn {
  padding: 11px 18px; background: none; border: none; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text-light);
  border-bottom: 3px solid transparent; white-space: nowrap; transition: all .2s;
  font-family: var(--ff-ui);
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--gold); font-weight: 600; }
.tab-btn:hover { background: var(--gold-pale); color: var(--text); }
.tab-btn .tab-count {
  display: inline-block; background: var(--border); color: var(--text-mid);
  padding: 1px 6px; border-radius: 10px; font-size: 10px; margin-left: 4px; font-weight: 700;
}
.tab-btn.active .tab-count { background: var(--gold); color: var(--text); }

/* ── Main Content ────────────────────────────────────────────────────────── */
main { padding: 20px 24px; max-width: 1440px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }
.page-title {
  font-family: var(--ff-serif); font-size: 22px; font-weight: 600;
  color: var(--green); margin-bottom: 4px;
}
.page-sub { font-size: 12px; color: var(--text-light); margin-bottom: 20px; }

/* ── Cards & KPIs ────────────────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; text-align: center; box-shadow: var(--shadow); transition: transform .2s;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-light); font-weight: 600; margin-bottom: 6px; }
.kpi-value { font-size: 36px; font-weight: 700; color: var(--green); line-height: 1; }
.kpi-bar { height: 5px; background: var(--border-light); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.kpi-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width .6s ease; }
.kpi-detail { font-size: 11px; color: var(--text-mid); margin-top: 6px; }

/* ── Card Grid ───────────────────────────────────────────────────────────── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.card-title { font-family: var(--ff-serif); font-size: 17px; font-weight: 600; color: var(--green); margin-bottom: 12px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

/* ── Tables ──────────────────────────────────────────────────────────────── */
.table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; box-shadow: var(--shadow); }
table { width: 100%; font-size: 13px; border-collapse: collapse; }
thead { background: var(--gold-pale); border-bottom: 2px solid var(--border); }
th { padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text); font-size: 12px; white-space: nowrap; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--gold); }
th.sortable::after { content: ' ↕'; font-size: 10px; color: var(--text-light); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
tbody tr:hover { background: var(--gold-pale); }
tbody tr.called { background: var(--green-bg); }
tbody tr.vm { background: var(--amber-bg); }

/* ── Filters ─────────────────────────────────────────────────────────────── */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: end;
}
.filter-group { display: flex; flex-direction: column; }
.filter-group label { font-size: 11px; font-weight: 600; color: var(--text-light); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .3px; }
.filter-group input, .filter-group select {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; background: var(--white); color: var(--text); min-width: 140px;
}
.filter-group input:focus, .filter-group select:focus { border-color: var(--gold); outline: none; }

/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-green { background: var(--green-bg); color: #2E7D32; }
.badge-blue { background: var(--blue-bg); color: #1565C0; }
.badge-amber { background: var(--amber-bg); color: #E65100; }
.badge-purple { background: var(--purple-bg); color: #6A1B9A; }
.badge-gray { background: #EEEEEE; color: var(--text-mid); }
.suburb-pill { background: var(--gold-pale); color: var(--text-mid); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
button, .btn {
  padding: 8px 14px; background: var(--green); color: var(--white); border: none;
  border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
  font-family: var(--ff-ui); transition: all .2s;
}
button:hover, .btn:hover { background: var(--green-light); transform: translateY(-1px); }
.btn-gold { background: var(--gold); color: var(--text); }
.btn-gold:hover { background: #B8941D; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-mid); }
.btn-outline:hover { background: var(--gold-pale); border-color: var(--gold); color: var(--text); transform: none; }
.btn-danger { background: var(--red); }
.btn-danger:hover { background: #B71C1C; }

/* ── Inline Editable Fields ──────────────────────────────────────────────── */
.inline-edit {
  border: 1px solid transparent; background: transparent; padding: 4px 6px;
  font-size: 12px; border-radius: 4px; font-family: var(--ff-ui); color: var(--text);
  transition: all .2s;
}
.inline-edit:hover { border-color: var(--border); background: var(--gold-pale); }
.inline-edit:focus { border-color: var(--gold); background: var(--white); outline: none; box-shadow: 0 0 0 2px rgba(196,164,57,.2); }
.inline-edit::placeholder { color: var(--text-light); }

/* ── Pagination ──────────────────────────────────────────────────────────── */
.pagination { display: flex; justify-content: center; gap: 4px; margin-top: 16px; flex-wrap: wrap; }
.pagination button { padding: 5px 10px; font-size: 11px; min-width: 34px; border-radius: 4px; }
.pagination button.active { background: var(--gold); color: var(--text); }
.pg-info { text-align: center; font-size: 11px; color: var(--text-light); margin-top: 6px; }

/* ── Forms ────────────────────────────────────────────────────────────────── */
.inline-form {
  background: var(--gold-pale); padding: 16px; border-radius: var(--radius);
  margin-bottom: 16px; border: 1px solid var(--border); display: none;
}
.inline-form.active { display: block; }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.form-group input, .form-group textarea, .form-group select {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; background: var(--white); color: var(--text); font-family: var(--ff-ui);
}
.form-group textarea { resize: vertical; min-height: 50px; }

/* ── Agent Comments ──────────────────────────────────────────────────────── */
.agent-comment {
  width: 100%; padding: 5px 8px; border: 1px solid var(--border-light); border-radius: 4px;
  font-family: var(--ff-ui); font-size: 11px; resize: none; height: 32px; transition: border-color .2s;
}
.agent-comment:focus { border-color: var(--gold); outline: none; height: 60px; }
.checkbox { cursor: pointer; accent-color: var(--gold); width: 16px; height: 16px; }

/* ── Toast ────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--green); color: var(--white);
  padding: 12px 20px; border-radius: var(--radius); z-index: 2000;
  box-shadow: 0 4px 16px rgba(0,0,0,.2); font-size: 13px; font-weight: 500;
  animation: slideIn .3s ease;
}
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Map ─────────────────────────────────────────────────────────────────── */
.map-container {
  height: 450px; border: 1px solid var(--border); border-radius: var(--radius);
  margin-top: 16px; display: none; overflow: hidden;
}
.map-container.active { display: block; }

/* ── Section Tabs ────────────────────────────────────────────────────────── */
.section-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
.section-tab {
  padding: 10px 16px; background: none; border: none; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text-light);
  border-bottom: 3px solid transparent; font-family: var(--ff-ui);
}
.section-tab.active { color: var(--text); border-bottom-color: var(--gold); }
.section-tab:hover { background: var(--gold-pale); }
.section-content { display: none; }
.section-content.active { display: block; }

/* ── Proping Tab ─────────────────────────────────────────────────────────── */
.p-suburb-block { margin-bottom: 20px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
.p-suburb-hdr {
  background: var(--green); color: var(--white);
  padding: 10px 16px; font-size: 12px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; display: flex; align-items: center; gap: 10px;
}
.p-suburb-counts { display: flex; gap: 6px; margin-left: auto; }
.p-cnt { border-radius: 10px; padding: 2px 10px; font-size: 10px; font-weight: 700; }
.p-cnt-change { background: var(--red-bg); color: var(--red); }
.p-cnt-new { background: var(--green-bg); color: #2E7D32; }
.p-cnt-sold { background: var(--blue-bg); color: #1565C0; }
.p-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  padding: 6px 14px; background: #fafaf8; border-bottom: 1px solid var(--border-light); color: var(--text-mid);
}
.p-row {
  display: flex; align-items: baseline; gap: 10px; padding: 8px 14px;
  border-bottom: 1px solid var(--border-light); font-size: 12px;
}
.p-row:last-child { border-bottom: none; }
.p-addr { font-weight: 700; color: var(--green); }
.p-addr a { color: var(--green); text-decoration: none; }
.p-addr a:hover { text-decoration: underline; }
.p-price { font-weight: 700; color: var(--text); }
.p-change-neg { color: var(--red); font-weight: 700; }
.p-change-pos { color: #2E7D32; font-weight: 700; }
.p-agent { color: var(--text-light); font-size: 11px; margin-left: auto; }
.p-date-chip { font-size: 9px; background: var(--gold-pale); color: var(--text-light); border-radius: 8px; padding: 1px 6px; }
.p-beds { color: var(--text-mid); font-size: 11px; }

/* ── Proping Snapshot Widget ─────────────────────────────────────────────── */
.proping-snap { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
.proping-snap-title { font-family: var(--ff-serif); font-size: 18px; color: var(--green); margin-bottom: 12px; border-bottom: 1px solid var(--border-light); padding-bottom: 8px; }
.snap-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border-light); font-size: 12px; }
.snap-row:last-child { border-bottom: none; }
.snap-suburb { font-weight: 700; color: var(--green); }
.snap-pills { display: flex; gap: 6px; }
.email-src-badge { background: var(--blue-bg); color: #1565C0; border-radius: 10px; padding: 1px 8px; font-size: 9px; font-weight: 700; }

/* ── Chart ────────────────────────────────────────────────────────────────── */
.chart-container { position: relative; height: 280px; margin-bottom: 20px; }

/* ── Empty State ─────────────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-light); font-size: 14px; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* ── Match Row ───────────────────────────────────────────────────────────── */
.match-count { display: inline-block; background: var(--green); color: var(--white); padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-left: 4px; }
.expanded-matches { display: none; }
.expanded-matches.active { display: block; }
.match-card { background: var(--gold-pale); padding: 10px 14px; border-radius: 6px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }

/* ── Client Profile Overlay ─────────────────────────────────────────────── */
.profile-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 1000; display: flex;
  justify-content: center; align-items: flex-start; padding: 20px;
  overflow-y: auto; animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.profile-panel {
  background: var(--bg); border-radius: 12px; width: 100%; max-width: 900px;
  margin: 20px auto; box-shadow: 0 8px 32px rgba(0,0,0,.2); overflow: hidden;
}
.profile-header {
  background: var(--green); color: var(--white); padding: 24px 28px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.profile-header h2 { font-family: var(--ff-serif); font-size: 24px; font-weight: 600; margin-bottom: 4px; }
.profile-header .profile-meta { font-size: 12px; opacity: .8; display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; }
.profile-header .profile-meta span { display: flex; align-items: center; gap: 4px; }
.profile-close { background: rgba(255,255,255,.15); border: none; color: white; font-size: 20px; cursor: pointer; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
.profile-close:hover { background: rgba(255,255,255,.3); }
.profile-body { padding: 20px 28px; }
.profile-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
.profile-section-title { font-family: var(--ff-serif); font-size: 16px; color: var(--green); font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
.profile-section-title .count-pill { background: var(--green); color: white; font-family: var(--ff-ui); font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
.profile-stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.profile-stat { background: var(--gold-pale); border-radius: 6px; padding: 12px; text-align: center; }
.profile-stat .stat-val { font-size: 22px; font-weight: 700; color: var(--green); }
.profile-stat .stat-label { font-size: 10px; color: var(--text-mid); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
.profile-prop-card { background: var(--gold-pale); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.profile-prop-card .prop-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.profile-prop-card .prop-addr { font-weight: 600; font-size: 13px; color: var(--green); }
.profile-prop-card .prop-detail { font-size: 11px; color: var(--text-mid); }
.profile-prop-card .prop-price { font-weight: 700; font-size: 13px; }
.profile-prop-card .prop-comment { margin-top: 8px; }
.profile-prop-card .prop-comment textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; font-size: 11px; font-family: var(--ff-ui); resize: vertical; min-height: 36px; }
.profile-prop-card .prop-comment textarea:focus { border-color: var(--gold); outline: none; }
.profile-general-comments textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; font-size: 12px; font-family: var(--ff-ui); resize: vertical; min-height: 80px; }
.profile-general-comments textarea:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(196,164,57,.2); }
.profile-login-placeholder { background: var(--blue-bg); border-radius: 6px; padding: 14px; font-size: 12px; color: #1565C0; display: flex; align-items: center; gap: 8px; }
.client-name-link { cursor: pointer; color: var(--green); text-decoration: none; }
.client-name-link:hover { text-decoration: underline; }
@media (max-width: 768px) {
  .profile-overlay { padding: 8px; }
  .profile-panel { margin: 8px auto; }
  .profile-header { padding: 16px; flex-wrap: wrap; }
  .profile-header h2 { font-size: 18px; }
  .profile-body { padding: 12px; }
  .profile-section { padding: 12px; }
  .profile-stat-grid { grid-template-columns: repeat(2, 1fr); }
  .profile-close { position: absolute; top: 12px; right: 12px; }
}
@media (max-width: 480px) {
  .profile-stat-grid { grid-template-columns: 1fr 1fr; }
  .profile-prop-card .prop-top { flex-direction: column; align-items: flex-start; gap: 4px; }
}

/* ── Editable Input ──────────────────────────────────────────────────────── */
.editable-input { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; width: 90px; font-size: 12px; font-family: var(--ff-ui); }
.editable-input:focus { border-color: var(--gold); outline: none; }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .two-col { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; gap: 8px; }
  .filter-group { width: 100%; }
  .filter-group input, .filter-group select { width: 100%; min-width: unset; box-sizing: border-box; }
  header { padding: 10px 12px; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 18px; }
  .header-search { max-width: 100%; order: 3; flex-basis: 100%; }
  main { padding: 8px; }
  table { min-width: 600px; font-size: 12px; }
  th { padding: 8px 6px; font-size: 11px; }
  td { padding: 8px 6px; font-size: 12px; }
  .page-title { font-size: 18px; }
  .page-sub { font-size: 11px; }
  .tab-bar { top: 44px; }
  .inline-form { padding: 12px; }
  .form-grid { grid-template-columns: 1fr !important; }
  .card { padding: 12px; }

  'mosman':2088,'balmoral':2088,'beauty point':2088,

function domainUrl(address, suburb, type) {
  function slugify(s) { return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
  const s = slugify(suburb);
  const a = slugify(address.replace(/,.*$/,''));
  const pc = SUBURB_POSTCODES[(suburb||'').toLowerCase().trim()] || 2060;
  return `https://www.domain.com.au/${a}-${s}-nsw-${pc}`;
}

function getSuburbCoords(suburb) {
  const key = (suburb||'').toLowerCase().trim();
  return SUBURB_COORDS[key] || [-33.8388, 151.2093];
}

function jitterCoord(c) { return [c[0]+(Math.random()-.5)*.005, c[1]+(Math.random()-.5)*.005]; }

// Geocode cache in localStorage
function _lsGetEarly(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
const _geoCache = _lsGetEarly('mmGeoCache', {});
function saveGeoCache() { lsSet('mmGeoCache', _geoCache); }

async function geocodeAddress(address, suburb) {
  const key = (address + ', ' + suburb).toLowerCase().trim();
  if (_geoCache[key]) return _geoCache[key];
  try {
    const q = encodeURIComponent(address + ', ' + suburb + ', NSW, Australia');
    const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=au`, {
      headers: { 'Accept': 'application/json' }
    });
    const data = await resp.json();
    if (data && data.length > 0) {
      const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      _geoCache[key] = coords;
      saveGeoCache();
      return coords;
    }
  } catch (e) { /* fallback to suburb */ }
  return null;
}

function showPropertyMap(containerId, items, getLabel, getPrice, getSuburb, getAddress) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.classList.add('active');
  if (_leafletMaps[containerId]) { _leafletMaps[containerId].invalidateSize(); return; }
  const map = L.map(containerId).setView([-33.83, 151.22], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
  _leafletMaps[containerId] = map;

  const markers = [];
  // If getAddress is provided, geocode each item for accurate pins
  if (getAddress) {
    let pending = items.length;
    const bounds = [];
    items.forEach((item, i) => {
      const addr = getAddress(item);
      const suburb = getSuburb(item);
      const popup = `<b>${getLabel(item)}</b><br>${getPrice(item)}<br><small>${suburb}</small>`;
      const cacheKey = (addr + ', ' + suburb).toLowerCase().trim();

      if (_geoCache[cacheKey]) {
        const m = L.marker(_geoCache[cacheKey]).addTo(map).bindPopup(popup);
        bounds.push(_geoCache[cacheKey]);
        finish();
      } else {
        // Place with suburb fallback immediately, then update when geocoded
        const fallback = jitterCoord(getSuburbCoords(suburb));
        const m = L.marker(fallback).addTo(map).bindPopup(popup);
        bounds.push(fallback);
        markers.push({ marker: m, item, idx: i });
        finish();

        // Geocode with rate limiting (1 req/sec for Nominatim policy)
        setTimeout(async () => {
          const coords = await geocodeAddress(addr, suburb);
          if (coords) {
            m.setLatLng(coords);
            if (map.getBounds) {
              try { map.fitBounds(L.latLngBounds(items.map((it, j) => {
                const k2 = (getAddress(it) + ', ' + getSuburb(it)).toLowerCase().trim();
                return _geoCache[k2] || getSuburbCoords(getSuburb(it));
              })).pad(0.1)); } catch(e) {}
            }
          }
        }, i * 1100);
      }

      function finish() {
        pending--;
        if (pending === 0 && bounds.length > 1) {
          try { map.fitBounds(L.latLngBounds(bounds).pad(0.1)); } catch(e) {}
        }
      }
    });
  } else {
    items.forEach(item => {
      const c = jitterCoord(getSuburbCoords(getSuburb(item)));
      L.marker(c).addTo(map).bindPopup(`<b>${getLabel(item)}</b><br>${getPrice(item)}<br><small>${getSuburb(item)}</small>`);
    });
  }
  setTimeout(() => map.invalidateSize(), 200);
}

function showToast(msg) {
  const d = document.createElement('div'); d.className = 'toast'; d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(re, '<span class="g-hl">$1</span>');
}

function fmtPrice(p) {
  if (!p) return '—';
  const s = String(p).trim();
  if (s.startsWith('$')) return s;
  const n = parseFloat(s.replace(/[^0-9.]/g,''));
  if (isNaN(n)) return s;
  return '$' + n.toLocaleString('en-AU');
}

function parsePrice(s) {
  if (!s) return 0;
  const nums = String(s).match(/[\d,]+/g);
  if (!nums) return 0;
  for (const n of nums) { const v = parseFloat(n.replace(/,/g,'')); if (v > 50000) return v; }
  return 0;
}

function renderSearch(q) {
  const dd = document.getElementById('searchDropdown');
  if (!q || q.length < 2) { dd.classList.remove('active'); dd.innerHTML = ''; return; }
  q = q.toLowerCase();
  let html = '';
  const max = 6;

    (l.address||'').toLowerCase().includes(q) || (l.suburb||'').toLowerCase().includes(q)
  ).slice(0, max);

    html += '<div class="search-group"><div class="search-group-title">For Sale</div>';
    fs.forEach(l => {
      const addr = (l.address||'').replace(/'/g,"\\'");
      html += `<div class="search-item" onclick="goToItem('forsale','${addr}',filterForSale,'fs-q')">

    });

  }

  // Off Market
  const om = (D.sampleOff||[]).filter(l =>
    (l.address||'').toLowerCase().includes(q) || (l.suburb||'').toLowerCase().includes(q)
  ).slice(0, max);
  if (om.length) {
    html += '<div class="search-group"><div class="search-group-title">Off Market</div>';
    om.forEach(l => {
      const addr = (l.address||l.agent||'').replace(/'/g,"\\'");
      html += `<div class="search-item" onclick="goToItem('offmarket','${addr}',filterOffMarket,'om-q')">
        <div>${hl(l.address||l.agent||'', q)}</div>
        <div class="search-price">${l.price||'—'}</div>
        <div class="search-suburb">${hl(l.suburb, q)}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Sold
  const sold = (D.soldListings||[]).filter(l =>
    (l.address||'').toLowerCase().includes(q) || (l.suburb||'').toLowerCase().includes(q)
  ).slice(0, max);
  if (sold.length) {
    html += '<div class="search-group"><div class="search-group-title">Sold</div>';
    sold.forEach(l => {
      const addr = (l.address||'').replace(/'/g,"\\'");
      html += `<div class="search-item" onclick="goToItem('sold','${addr}',filterSold,'sold-q')">
        <div>${hl(l.address, q)}</div>
        <div class="search-price">${l.price||'—'}</div>
        <div class="search-suburb">${hl(l.suburb, q)} · ${l.method||''}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Agents
  const ag = (D.allAgents||[]).filter(a =>
    (a.name||'').toLowerCase().includes(q) || (a.agency||'').toLowerCase().includes(q)
  ).slice(0, max);
  if (ag.length) {
    html += '<div class="search-group"><div class="search-group-title">Agents</div>';
    ag.forEach(a => {
      const name = (a.name||'').replace(/'/g,"\\'");
      html += `<div class="search-item" onclick="goToItem('allagents','${name}',filterAllAgents,'ag-q')">
        <div>${hl(a.name, q)}</div>
        <div class="search-suburb">${hl(a.agency, q)} · ${a.suburb||''}</div>
      </div>`;
    });
    html += '</div>';
  }

  if (!html) html = '<div class="search-item" style="color:var(--text-light)">No results found</div>';
  dd.innerHTML = html;
  dd.classList.add('active');
}

document.getElementById('globalSearch').addEventListener('input', e => renderSearch(e.target.value));

function goToItem(tab, query, filterFn, inputId) {
  closeSearch();
  showTab(tab);
  const inp = document.getElementById(inputId);
  if (inp) inp.value = query;
  if (filterFn) filterFn();
  // Highlight first matching row after render
  setTimeout(() => {
    const tbody = document.querySelector(`#page-${tab} tbody`);
    if (!tbody) return;
    const rows = tbody.querySelectorAll('tr');
    const ql = query.toLowerCase();
    for (const row of rows) {
      if (row.textContent.toLowerCase().includes(ql)) {
        row.style.background = 'rgba(46,125,50,0.12)';
        row.scrollIntoView({behavior:'smooth', block:'center'});
        setTimeout(() => row.style.background = '', 3000);
        break;
      }
    }
  }, 100);
}

function _countThisWeek(items, dateField) {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  let count = 0;
  for (const item of items) {
    const d = _parseFlexDate(item[dateField] || item.date || item.listDate || item.soldDate || '');
    if (d && d >= monday.getTime()) count++;
  }
  return count;
}

function _countNewMatches() {
  const saved = lsGet('mmSavedMatches', {});
  let count = 0;
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  for (const client of Object.values(saved)) {
    for (const m of client) {
      const d = _parseFlexDate(m.date || '');
      if (d && d >= monday.getTime()) count++;
    }
  }
  return count;
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAGINATION HELPER
// ═══════════════════════════════════════════════════════════════════════════════
function paginateTable(tableBodyId, pagingId, items, renderRow, perPage) {
  perPage = perPage || PER_PAGE;
  const pgKey = 'page_' + tableBodyId;
  let pg = parseInt(localStorage.getItem(pgKey) || '0');
  const totalPages = Math.ceil(items.length / perPage);
  if (pg >= totalPages) pg = Math.max(0, totalPages - 1);
  localStorage.setItem(pgKey, pg);

  const start = pg * perPage;
  const slice = items.slice(start, start + perPage);
  const tbody = document.getElementById(tableBodyId);
  if (tbody) tbody.innerHTML = slice.map(renderRow).join('');

  const pagDiv = document.getElementById(pagingId);
  if (pagDiv && totalPages > 1) {
    let html = '';
    if (pg > 0) html += `<button onclick="goPage('${tableBodyId}','${pagingId}',${pg-1})" class="btn-sm btn-outline">‹</button>`;
    const range = 3;
    let lo = Math.max(0, pg-range), hi = Math.min(totalPages-1, pg+range);
    if (lo > 0) html += `<button onclick="goPage('${tableBodyId}','${pagingId}',0)" class="btn-sm btn-outline">1</button><span style="padding:0 4px;color:var(--text-light)">…</span>`;
    for (let i = lo; i <= hi; i++) {
      html += `<button onclick="goPage('${tableBodyId}','${pagingId}',${i})" class="btn-sm ${i===pg?'active':'btn-outline'}">${i+1}</button>`;
    }
    if (hi < totalPages-1) html += `<span style="padding:0 4px;color:var(--text-light)">…</span><button onclick="goPage('${tableBodyId}','${pagingId}',${totalPages-1})" class="btn-sm btn-outline">${totalPages}</button>`;
    if (pg < totalPages-1) html += `<button onclick="goPage('${tableBodyId}','${pagingId}',${pg+1})" class="btn-sm btn-outline">›</button>`;
    pagDiv.innerHTML = html;
    pagDiv.innerHTML += `<div class="pg-info">Showing ${start+1}–${Math.min(start+perPage, items.length)} of ${items.length}</div>`;
  } else if (pagDiv) {
    pagDiv.innerHTML = items.length ? `<div class="pg-info">${items.length} results</div>` : '';
  }
}

// Global page change handler
window.goPage = function(tbId, pgId, pg) {
  localStorage.setItem('page_' + tbId, pg);
  // Re-render the current tab
  const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
  if (activeTab && TAB_PAGES[activeTab]) TAB_PAGES[activeTab]();
};

      </div>
    </div>`;

  // Proping Snapshot Widget
  if (typeof propingHistory !== 'undefined' && propingHistory.length) {
    const seen = new Set();
    const subMap = {};
    for (const day of propingHistory) {
      for (const section of ['price_changes','newly_listed','sold']) {

          seen.add(addr);
          const suburb = (p.suburb||'Unknown').trim()||'Unknown';
          if (!subMap[suburb]) subMap[suburb] = {c:0,n:0,s:0};

    const suburbs = Object.keys(subMap).sort();
    if (suburbs.length) {
      const dates = propingHistory.map(e=>e.date).filter(Boolean);
      const range = dates.length>1?`${dates[dates.length-1]} – ${dates[0]}`:(dates[0]||'');

// ── Client Matching Logic ─────────────────────────────────────────────────
function getClientMatches(client) {
  const dismissed = lsGet('mmDismissedProps', {})[client.name] || [];
  const savedMatches = (lsGet('mmSavedMatches', {})[client.name] || []).map(m => m.address);
  const locs = (client.locations||'').toLowerCase().split(/[,;]+/).map(s => s.trim()).filter(Boolean);
  if (!locs.length) return [];

  const all = [...(D.sampleListings||[]).map(l=>({...l,_src:'For Sale'})), ...(D.sampleOff||[]).map(l=>({...l,_src:'Off Market'}))];
  return all.filter(l => {
    const sub = (l.suburb||'').toLowerCase();
    const addr = (l.address||'').toLowerCase();
    if (dismissed.includes(addr) || savedMatches.includes(addr)) return false;
    return locs.some(loc => sub.includes(loc) || loc.includes(sub));
  });
}

function toggleMatchRow(clientName) {
  const id = 'matches-' + clientName.replace(/[^a-z0-9]/gi, '_');
  const row = document.getElementById(id);
  if (!row) return;
  if (row.classList.contains('active')) { row.classList.remove('active'); return; }
  row.classList.add('active');

  const client = (D.xlsxClients||[]).find(c => c.name === clientName) || {name:clientName,locations:''};
  const saved = (lsGet('mmSavedMatches', {})[clientName] || []);
  const matches = getClientMatches(client);

  let html = '<div style="padding:12px">';
  if (saved.length) {
    html += '<div style="font-weight:600;font-size:12px;margin-bottom:6px">Saved Matches:</div>';
    saved.forEach((m,i) => {
      html += `<div class="match-card"><span>${m.address} · ${m.suburb} · ${m.price||'—'}</span>
        <button class="btn-sm btn-danger" onclick="removeFromClient('${clientName}',${i})">Remove</button></div>`;
    });
  }
  if (matches.length) {
    html += `<div style="font-weight:600;font-size:12px;margin:8px 0 6px">Suggested (${matches.length}):</div>`;
    matches.slice(0,10).forEach(m => {
      html += `<div class="match-card">
        <span>${m.address||''} · ${m.suburb} · ${m.price||'—'} · <span class="badge badge-gray">${m._src}</span></span>
        <span>
          <button class="btn-sm btn-gold" onclick="saveMatchForClient('${clientName}','${(m.address||'').replace(/'/g,"\\'")}','${m.suburb}','${(m.price||'').replace(/'/g,"\\'")}','${m._src}','')">Save</button>
          <button class="btn-sm btn-outline" onclick="dismissMatch('${clientName}','${(m.address||'').toLowerCase().replace(/'/g,"\\'")}')">Skip</button>
        </span></div>`;
    });
  } else if (!saved.length) {
    html += '<div class="empty-state" style="padding:16px">No matching properties found for this client\'s location preferences.</div>';
  }
  html += '</div>';
  row.querySelector('td').innerHTML = html;
}

function saveMatchForClient(clientName, address, suburb, price, type, note) {
  const all = lsGet('mmSavedMatches', {});
  if (!all[clientName]) all[clientName] = [];

function _getClientPropingStats(locs) {
  const stats = { newListings: 0, priceChanges: 0, soldRecent: 0, totalForSale: 0, totalOffMarket: 0 };
  const now = Date.now();
  const sevenDaysAgo = now - 7 * 24 * 60 * 60 * 1000;

  const matchesLoc = (sub) => {
    if (!locs.length) return true;
    const s = (sub||'').toLowerCase();
    return locs.some(loc => s.includes(loc) || loc.includes(s));
  };

  // Count from propingHistory
  if (typeof propingHistory !== 'undefined') {
    for (const day of propingHistory) {
      const dayDate = _parseFlexDate(day.date);
      if (dayDate && dayDate >= sevenDaysAgo) {
        for (const nl of (day.newly_listed || [])) {
          if (matchesLoc(nl.suburb)) stats.newListings++;
        }
        for (const pc of (day.price_changes || [])) {
          if (matchesLoc(pc.suburb)) stats.priceChanges++;
        }
        for (const s of (day.sold || [])) {
          if (matchesLoc(s.suburb)) stats.soldRecent++;
        }
      }
    }
  }

  // Count for sale and off market in client's suburbs
  (D.sampleListings || []).forEach(l => { if (matchesLoc(l.suburb)) stats.totalForSale++; });
  (D.sampleOff || []).forEach(l => { if (matchesLoc(l.suburb)) stats.totalOffMarket++; });

  return stats;
}

function _getNewListings7d(locs, client) {
  const now = Date.now();
  const sevenDaysAgo = now - 7 * 24 * 60 * 60 * 1000;
  const matchesLoc = (sub) => {
    if (!locs.length) return true;
    const s = (sub||'').toLowerCase();
    return locs.some(loc => s.includes(loc) || loc.includes(s));
  };

  // From sampleListings with recent dates
  const results = [];
  (D.sampleListings || []).forEach(l => {
    if (!matchesLoc(l.suburb)) return;
    const d = _parseFlexDate(l.listDate || l.date || '');
    if (d && d >= sevenDaysAgo) results.push(l);
  });

  // Also from propingHistory newly_listed
  if (typeof propingHistory !== 'undefined') {
    for (const day of propingHistory) {
      const dayDate = _parseFlexDate(day.date);
      if (dayDate && dayDate >= sevenDaysAgo) {
        for (const nl of (day.newly_listed || [])) {
          if (matchesLoc(nl.suburb)) {
            // Avoid duplicates
            const k = (nl.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
            if (!results.some(r => (r.address||'').toLowerCase().replace(/[^a-z0-9]/g,'') === k)) {
              results.push(nl);
            }
          }
        }
      }
    }
  }

  // Filter by beds if spec mentions beds
  const specBeds = _parseBedsFromSpec(client.spec || '');
  if (specBeds) {
    return results.filter(l => {
      const b = parseInt(l.beds || l.bed || 0);
      return b >= specBeds;
    });
  }
  return results;
}

function _getForSaleMatches(locs, client) {
  const matchesLoc = (sub) => {
    if (!locs.length) return true;
    const s = (sub||'').toLowerCase();
    return locs.some(loc => s.includes(loc) || loc.includes(s));
  };
  let results = (D.sampleListings || []).filter(l => matchesLoc(l.suburb));

  const specBeds = _parseBedsFromSpec(client.spec || '');
  if (specBeds) results = results.filter(l => parseInt(l.beds||l.bed||0) >= specBeds);

  return results;
}

function _getOffMarketMatches(locs, client) {
  const matchesLoc = (sub) => {
    if (!locs.length) return true;
    const s = (sub||'').toLowerCase();
    return locs.some(loc => s.includes(loc) || loc.includes(s));
  };
  let results = (D.sampleOff || []).filter(l => matchesLoc(l.suburb));

  const specBeds = _parseBedsFromSpec(client.spec || '');
  if (specBeds) results = results.filter(l => parseInt(l.beds||l.bed||0) >= specBeds);

  return results;
}

function _parseBedsFromSpec(spec) {
  if (!spec) return 0;
  const m = spec.match(/(\d+)\+?\s*bed/i);
  return m ? parseInt(m[1]) : 0;
}

// DATE SORTING UTILITY
// ═══════════════════════════════════════════════════════════════════════════════
const _monthMap = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function _parseFlexDate(s) {
  if (!s) return 0;
  if (s instanceof Date) return s.getTime() || 0;
  s = String(s).trim();
  // ISO / YYYY-MM-DD
  if (/^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/.test(s)) return new Date(s).getTime() || 0;
  // DD/MM/YYYY or DD-MM-YYYY
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]).getTime() || 0;
  // DD MMM YYYY or DD-MMM-YYYY or DD-MMM-YY
  m = s.match(/^(\d{1,2})[\s\-]+([A-Za-z]{3,9})[\s\-]+(\d{2,4})$/);
  if (m) {
    let yr = +m[3]; if (yr < 100) yr += 2000;
    const mo = _monthMap[m[2].slice(0,3).toLowerCase()];
    if (mo !== undefined) return new Date(yr, mo, +m[1]).getTime() || 0;
  }
  // MMM DD, YYYY
  m = s.match(/^([A-Za-z]{3,9})\s+(\d{1,2}),?\s+(\d{4})$/);
  if (m) {
    const mo = _monthMap[m[1].slice(0,3).toLowerCase()];
    if (mo !== undefined) return new Date(+m[3], mo, +m[2]).getTime() || 0;
  }
  // fallback
  const t = new Date(s).getTime();
  return isNaN(t) ? 0 : t;
}
function _sortByDateDesc(arr, field) {
  return arr.sort((a, b) => _parseFlexDate(b[field]) - _parseFlexDate(a[field]));
}

function filterForSale() {
  const sub = document.getElementById('fs-suburb')?.value || '';
  const propType = document.getElementById('fs-type')?.value || '';
  const beds = parseInt(document.getElementById('fs-beds')?.value) || 0;
  const q = (document.getElementById('fs-q')?.value || '').toLowerCase();
  const userAdded = lsGet('mmNewSale', []);
  let items = [...(D.sampleListings||[]), ...userAdded];
  if (sub) items = items.filter(l => l.suburb === sub);
  if (propType) items = items.filter(l => (l.propertyType||l.type||'') === propType);
  if (beds) items = items.filter(l => parseInt(l.beds||0) >= beds);
  if (q) items = items.filter(l => (l.address||'').toLowerCase().includes(q) || (l.agentNames||'').toLowerCase().includes(q) || (l.agencyName||'').toLowerCase().includes(q) || (l.propertyType||l.type||'').toLowerCase().includes(q));
  _sortByDateDesc(items, 'listDate');

  const fsEdits = lsGet('mmForSaleEdits', {});
  paginateTable('fs-tbody', 'fs-paging', items, l => {
    const tag = l.tagText || '';
    let badge = '';
    if (tag.toLowerCase().includes('price reduced') || tag.toLowerCase().includes('price drop')) badge = '<span class="badge badge-red">↓ Reduced</span>';
    else if (tag.toLowerCase() === 'new') badge = '<span class="badge badge-green">New</span>';
    else if (tag.toLowerCase() === 'updated') badge = '<span class="badge badge-amber">Updated</span>';
    else if (tag.toLowerCase().includes('under offer')) badge = '<span class="badge badge-purple">Under Offer</span>';
    else if (tag.toLowerCase().includes('auction')) badge = '<span class="badge badge-blue">Auction</span>';
    const url = l.url || domainUrl(l.address||'', l.suburb||'');
    const land = l.landSize ? (l.landSize + ' m²') : '—';
    const days = l.daysOnMarket || l.daysListed || (l.listDate ? Math.floor((Date.now() - new Date(l.listDate).getTime()) / 86400000) : '—');
    const fsKey = (l.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    const fsE = fsEdits[fsKey] || {};
    const guideVal = fsE.guidePrice || l.guidePrice || '—';
    return `<tr>
      <td>${badge}</td>
      <td style="font-weight:600">${url ? `<a href="${url}" target="_blank" style="color:inherit">${l.address||'—'}</a>` : (l.address||'—')}</td>
      <td><span class="suburb-pill">${l.suburb||'—'}</span></td>
      <td>${l.propertyType||l.type||'—'}</td>
      <td style="text-align:center">${l.beds||'—'}</td>
      <td style="text-align:center">${l.baths||'—'}</td>
      <td style="text-align:center">${l.parking||l.car||'—'}</td>
      <td style="font-weight:600;color:var(--green)">${l.price||'—'}</td>
      <td><input class="inline-edit" value="${guideVal==='—'?'':guideVal}" placeholder="—" onblur="saveForSaleEdit('${fsKey}','guidePrice',this.value)" style="width:90px"></td>
      <td style="font-size:11px">${land}</td>
      <td style="text-align:center">${days}</td>
      <td style="font-size:11px">${l.agencyName||l.agency||'—'}</td>
      <td style="font-size:11px">${l.agentNames||'—'}</td>
    </tr>`;
  });

function _parseSmartSearch(q) {
  const result = {};
  if (!q) return result;
  q = q.toLowerCase().trim();

  // Extract price (e.g. "8m", "$3.5m", "2,000,000", "under 5m", "over 2m")
  const priceM = q.match(/(?:under|below|max|up\s*to)\s*\$?([\d.]+)\s*m/i);
  if (priceM) result.maxPrice = parseFloat(priceM[1]) * 1000000;
  const priceM2 = q.match(/(?:over|above|min|from)\s*\$?([\d.]+)\s*m/i);
  if (priceM2) result.minPrice = parseFloat(priceM2[1]) * 1000000;
  const priceM3 = q.match(/\$?([\d.]+)\s*m(?:il)?/i);
  if (priceM3 && !result.maxPrice && !result.minPrice) result.maxPrice = parseFloat(priceM3[1]) * 1000000;
  const priceM4 = q.match(/\$([\d,]+)/);
  if (priceM4 && !result.maxPrice && !result.minPrice) { const v = parseFloat(priceM4[1].replace(/,/g,'')); if (v > 100000) result.maxPrice = v; }

  // Extract beds (e.g. "4 bed", "3bed", "4 bedroom")
  const bedM = q.match(/(\d)\s*(?:bed|br|bedroom)/i);
  if (bedM) result.beds = parseInt(bedM[1]);

  // Extract baths
  const bathM = q.match(/(\d)\s*(?:bath|bathroom)/i);
  if (bathM) result.baths = parseInt(bathM[1]);

  // Extract property type
  const typeWords = ['house','apartment','unit','townhouse','villa','duplex','studio','land','semi','terrace','penthouse'];
  for (const tw of typeWords) {
    if (q.includes(tw)) { result.type = tw; break; }
  }

  // Extract suburb - match against known suburbs
  const allSuburbs = [...new Set([...(D.sampleListings||[]).map(l=>l.suburb), ...(D.sampleOff||[]).map(l=>l.suburb)])].filter(Boolean);
  for (const sub of allSuburbs) {
    if (q.includes(sub.toLowerCase())) { result.suburb = sub; break; }
  }

  return result;
}

function runBuyerMatch() {
  const smart = (document.getElementById('bm-smart')?.value || '').trim();
  const parsed = _parseSmartSearch(smart);

  const minPrice = parsed.minPrice || parsePrice(document.getElementById('bm-min').value);
  const maxPrice = parsed.maxPrice || parsePrice(document.getElementById('bm-max').value);
  const suburb = parsed.suburb || document.getElementById('bm-suburb').value;
  const propType = (parsed.type || document.getElementById('bm-type').value).toLowerCase();
  const minBeds = parsed.beds || parseInt(document.getElementById('bm-beds').value) || 0;
  const minBaths = parsed.baths || parseInt(document.getElementById('bm-baths').value) || 0;
  const minCars = parseInt(document.getElementById('bm-cars').value) || 0;

  let items = [...(D.sampleListings||[]).map(l=>({...l,_src:'For Sale'})), ...(D.sampleOff||[]).map(l=>({...l,_src:'Off Market'}))];
  items = items.filter(l => {
    const p = parsePrice(l.price) || parsePrice(l.guidePrice);
    if (minPrice && p && p < minPrice) return false;
    if (maxPrice && p && p > maxPrice) return false;
    if (suburb && (l.suburb||'').toLowerCase() !== suburb.toLowerCase()) return false;
    if (propType && !(l.propertyType||l.type||'').toLowerCase().includes(propType)) return false;
    if (minBeds && parseInt(l.beds||0) < minBeds) return false;
    if (minBaths && parseInt(l.baths||0) < minBaths) return false;
    if (minCars && parseInt(l.parking||l.cars||0) < minCars) return false;
    return true;
  });

  const div = document.getElementById('bm-results');
  if (!items.length) {
    div.innerHTML = '<div class="empty-state"><div class="icon">🏠</div>No properties match your criteria</div>';
    document.getElementById('bm-map').classList.remove('active');
    return;
  }

  div.innerHTML = `<div style="margin-bottom:8px;font-weight:600">${items.length} matching properties</div>
    <div class="table-wrap"><table><thead><tr><th>Source</th><th>Address</th><th>Suburb</th><th>Type</th><th style="text-align:center">Beds</th><th style="text-align:center">Bath</th><th style="text-align:center">Cars</th><th>Price</th><th>Agency</th></tr></thead><tbody>` +
    items.map(l => {
      const url = l.url || domainUrl(l.address||'', l.suburb||'');
      return `<tr>
      <td><span class="badge ${l._src==='For Sale'?'badge-green':'badge-amber'}">${l._src}</span></td>
      <td style="font-weight:600">${url ? `<a href="${url}" target="_blank" style="color:inherit">${l.address||'—'}</a>` : (l.address||'—')}</td>
      <td><span class="suburb-pill">${l.suburb||'—'}</span></td>
      <td style="font-size:11px">${l.propertyType||l.type||'—'}</td>
      <td style="text-align:center">${l.beds||'—'}</td>
      <td style="text-align:center">${l.baths||'—'}</td>
      <td style="text-align:center">${l.parking||l.cars||'—'}</td>
      <td style="font-weight:600;color:var(--green)">${l.price||'—'}</td>
      <td style="font-size:11px">${l.agencyName||l.agency||'—'}</td>
    </tr>`;}).join('') + '</tbody></table></div>';

  // Reset map and show results
  delete _leafletMaps['bm-map'];
  document.getElementById('bm-map').classList.remove('active');
  document.getElementById('bm-map').innerHTML = '';
  showPropertyMap('bm-map', items, l=>l.address||'', l=>l.price||'', l=>l.suburb||'', l=>l.address||'');
}

function filterSold() {
  const sub = document.getElementById('sold-suburb')?.value || '';
  const propType = document.getElementById('sold-type')?.value || '';
  const beds = parseInt(document.getElementById('sold-beds')?.value) || 0;
  const method = document.getElementById('sold-method')?.value || '';
  const q = (document.getElementById('sold-q')?.value || '').toLowerCase();
  const edits = lsGet('mmSoldEdits', {});

  let items = [...(D.soldListings||[])];
  if (sub) items = items.filter(l => l.suburb === sub);
  if (propType) items = items.filter(l => (l.propertyType||l.type||'') === propType);
  if (beds) items = items.filter(l => parseInt(l.beds||0) >= beds);
  if (method) items = items.filter(l => (l.method||'') === method);
  if (q) items = items.filter(l => (l.address||'').toLowerCase().includes(q) || (l.agency||l.agencyName||'').toLowerCase().includes(q) || (l.propertyType||l.type||'').toLowerCase().includes(q));
  items.sort((a, b) => _parseFlexDate(b.date || b.soldDate) - _parseFlexDate(a.date || a.soldDate));

  paginateTable('sold-tbody', 'sold-paging', items, l => {
    const soldKey = (l.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    const e = edits[soldKey] || {};
    const guide = e.guidePrice || l.guidePrice || l.price || '';
    const sold = e.soldPrice || l.soldPrice || '';
    const guideNum = parsePrice(guide);
    const soldNum = parsePrice(sold);
    let pctBadge = '';
    if (guideNum && soldNum && guideNum !== soldNum) {
      const pct = ((soldNum - guideNum) / guideNum * 100).toFixed(0);
      pctBadge = parseInt(pct) >= 0 ? `<span class="badge badge-green">+${pct}%</span>` : `<span class="badge badge-red">${pct}%</span>`;
    }

    let methodBadge = '';
    if (l.method === 'Auction') methodBadge = '<span class="badge badge-blue">Auction</span>';
    else if (l.method === 'Private Treaty') methodBadge = '<span class="badge badge-green">Private Treaty</span>';
    else if (l.method === 'Prior to Auction') methodBadge = '<span class="badge badge-amber">Prior to Auction</span>';
    else methodBadge = `<span class="badge badge-gray">${l.method||'—'}</span>`;

    const url = l.url || domainUrl(l.address||'', l.suburb||'', 'sold');
    return `<tr>
      <td>${methodBadge}</td>
      <td style="font-weight:600">${url ? `<a href="${url}" target="_blank" style="color:inherit">${l.address||'—'}</a>` : (l.address||'—')}</td>
      <td><span class="suburb-pill">${l.suburb||'—'}</span></td>
      <td style="font-size:11px">${l.propertyType||l.type||'—'}</td>
      <td style="text-align:center">${l.beds||'—'}</td>
      <td style="text-align:center">${l.baths||'—'}</td>
      <td><input class="inline-edit" value="${sold}" placeholder="—" onblur="saveSoldEdit('${soldKey}','soldPrice',this.value)" style="width:100px;font-weight:600;color:var(--green)"></td>
      <td><input class="inline-edit" value="${guide}" placeholder="—" onblur="saveSoldEdit('${soldKey}','guidePrice',this.value)" style="width:100px"></td>
      <td>${pctBadge}</td>
      <td style="font-size:11px">${l.date||l.soldDate||'—'}</td>
      <td style="font-size:11px">${l.agencyName||l.agency||''}</td>
      <td style="font-size:11px">${l.agentNames||l.agents||''}</td>
    </tr>`;
  });
}

function toggleAgentCall(key) {
  const s = lsGet('mmCallStatus', {}); if (!s[key]) s[key]={}; s[key].called = !s[key].called;

function toggleAgentVM(key) {
  const s = lsGet('mmCallStatus', {}); if (!s[key]) s[key]={}; s[key].vm = !s[key].vm;
  lsSet('mmCallStatus', s);
}

function saveAgentComment(key, value) {
  const c = lsGet('mmCallComments', {}); c[key] = value; lsSet('mmCallComments', c);

function renderPropingContent() {
  const q = (document.getElementById('proping-q')?.value||'').toLowerCase();
  const secFilt = document.getElementById('proping-section-filter')?.value||'';
  const seen = new Set();
  const suburbMap = {};

  for (const day of propingHistory) {
    for (const section of ['price_changes','newly_listed','sold']) {
      for (const p of (day[section]||[])) {
        const addr = (p.address||'').toLowerCase();
        if (!addr || seen.has(addr)) continue;
        seen.add(addr);
        const suburb = (p.suburb||'Unknown').trim()||'Unknown';
        if (!suburbMap[suburb]) suburbMap[suburb] = {price_changes:[],newly_listed:[],sold:[]};
        if (q && !addr.includes(q) && !suburb.toLowerCase().includes(q)) continue;
        if (secFilt && section !== secFilt) continue;
        suburbMap[suburb][section].push(p);
      }
    }
  }

  const suburbs = Object.keys(suburbMap).filter(s => suburbMap[s].price_changes.length+suburbMap[s].newly_listed.length+suburbMap[s].sold.length > 0).sort();
  const LABELS = {price_changes:'Price Changes',newly_listed:'Newly Listed',sold:'Sold'};

  let html = '';
  for (const suburb of suburbs) {
    const d = suburbMap[suburb];
    html += `<div class="p-suburb-block"><div class="p-suburb-hdr">${suburb}
      <div class="p-suburb-counts">
        ${d.price_changes.length?`<span class="p-cnt p-cnt-change">↓ ${d.price_changes.length}</span>`:''}
        ${d.newly_listed.length?`<span class="p-cnt p-cnt-new">+ ${d.newly_listed.length}</span>`:''}
        ${d.sold.length?`<span class="p-cnt p-cnt-sold">✓ ${d.sold.length}</span>`:''}
      </div></div>`;
    for (const [key, label] of Object.entries(LABELS)) {
      if (d[key].length) {
        html += `<div class="p-section-label">${label}</div>`;
        html += d[key].map(p => renderPropRow(p, key)).join('');
      }
    }
    html += '</div>';
  }

  if (!html) html = '<div class="empty-state">No matching properties</div>';
  document.getElementById('proping-body').innerHTML = html;
}

// INIT
// ═══════════════════════════════════════════════════════════════════════════════
function washPropingData() {
  if (typeof propingHistory === 'undefined' || !propingHistory.length) return;

  // Build address lookup for For Sale
  const fsMap = {};
  (D.sampleListings||[]).forEach(l => {
    const k = (l.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    if (k) fsMap[k] = l;
  });

  // Build address lookup for Sold
  const soldMap = {};
  (D.soldListings||[]).forEach(l => {
    const k = (l.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    if (k) soldMap[k] = l;
  });

  let fsMatched = 0, soldMatched = 0;

  for (const day of propingHistory) {
    // Price changes → update guide prices on For Sale listings
    for (const pc of (day.price_changes||[])) {
      const k = (pc.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      if (k && fsMap[k] && pc.price) {
        if (!fsMap[k].guidePrice) { fsMap[k].guidePrice = pc.price; fsMatched++; }
      }
    }

    // Newly listed → fill missing prices on For Sale
    for (const nl of (day.newly_listed||[])) {
      const k = (nl.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      if (k && fsMap[k] && nl.price) {
        if (!fsMap[k].guidePrice) { fsMap[k].guidePrice = nl.price; fsMatched++; }
      }
    }

    // Sold → fill sold prices and guide prices on Sold tab
    for (const s of (day.sold||[])) {
      const k = (s.address||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      if (k && soldMap[k]) {
        if (s.sold_price && !soldMap[k].soldPrice) { soldMap[k].soldPrice = s.sold_price; soldMatched++; }
        if (s.price_guide && !soldMap[k].guidePrice) { soldMap[k].guidePrice = s.price_guide; }
        if (s.price && !soldMap[k].guidePrice) { soldMap[k].guidePrice = s.price; }
      }
      // Also check if sold property is still in For Sale — mark its guide price
      if (k && fsMap[k] && s.price_guide) {
        if (!fsMap[k].guidePrice) { fsMap[k].guidePrice = s.price_guide; }
      }
    }
  }

  if (fsMatched || soldMatched) {
    console.log(`Proping wash: ${fsMatched} For Sale guides, ${soldMatched} Sold prices matched`);
  }
}

// ── Email Off-Markets ──────────────────────────────────────────────────────
let emailOffPg = 1;
function filtEmailOff() {
  if (typeof emailOffMarkets === 'undefined') return [];
  const q = (document.getElementById('email-off-q')?.value || '').toLowerCase();
  return emailOffMarkets.filter(o =>
    !q ||
    (o.address||'').toLowerCase().includes(q) ||
    (o.suburb||'').toLowerCase().includes(q)  ||
    (o.agent||'').toLowerCase().includes(q)   ||
    (o.agency||'').toLowerCase().includes(q)
  );
}
function renderEmailOff(pg) {
  emailOffPg = pg || 1;
  const d = filtEmailOff();
  document.getElementById('email-off-lbl').textContent = d.length + ' properties';
  showPage(d, 'email-off-tbody', emailOffPg, o =>
    `<tr>
      <td style="font-size:10px;color:var(--text-light)">${o.date||'—'}</td>
      <td style="font-weight:600">${o.address||'—'}</td>
      <td><span class="suburb-pill">${o.suburb||'—'}</span></td>
      <td style="text-align:center">${o.beds||'—'}</td>
      <td style="text-align:center">${o.baths||'—'}</td>
      <td class="price-cell">${o.price||'—'}</td>
      <td class="agent-name">${o.agent||'—'}</td>
      <td class="ag-sub">${o.agency||'—'}</td>
      <td style="font-size:10px;color:var(--text-mid)">${(o.notes||'').slice(0,100)}</td>
    </tr>`
  );
  renderPg('email-off-pg', d.length, emailOffPg, p => renderEmailOff(p));
}
